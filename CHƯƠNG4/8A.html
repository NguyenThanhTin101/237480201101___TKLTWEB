<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở trang web bằng hàm open của đối tượng window.</title>
</head>
<body>
    <script language="JavaScript">
        var Luachon;
        Luachon= prompt("Bạn hãy nhập vào 1 số để mở trang web: ",1);
        switch(Luachon)
        {
            case "1":window.open("http://blu.edu.vn"); break;
            case "2":window.open("http://ctu.edu.vn"); break;
            case "3":window.open("https://vndoc.com"); break;
            default : window.open("https://meta.vn"); break;
        }
    </script>
</body>
</html>
