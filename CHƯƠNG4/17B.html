<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bai 17B</title>

<script>
function DoiMau(mau){
    document.body.style.backgroundColor = mau;
}
</script>

</head>

<body>

Chọn màu nền:<br><br>

<input type="radio" name="mau" onclick="DoiMau('yellow')"> Yellow<br>

<input type="radio" name="mau" onclick="DoiMau('green')"> Green<br>

<input type="radio" name="mau" onclick="DoiMau('brown')"> Brown<br>

<input type="radio" name="mau" onclick="DoiMau('magenta')"> Magenta<br>

</body>
</html>
