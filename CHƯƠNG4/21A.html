<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài 21A</title>
</head>
<body>

<h3>Máy tính đơn giản</h3>

Số 1:
<input type="text" id="so1"><br><br>

Số 2:
<input type="text" id="so2"><br><br>

Kết quả:
<input type="text" id="ketqua" readonly><br><br>

<button onclick="tinh('+')">Cộng</button>
<button onclick="tinh('-')">Trừ</button>
<button onclick="tinh('*')">Nhân</button>
<button onclick="tinh('/')">Chia</button>

<script>
function tinh(phep) {
    let a = parseFloat(document.getElementById("so1").value);
    let b = parseFloat(document.getElementById("so2").value);
    let kq;

    if (phep == '+') kq = a + b;
    if (phep == '-') kq = a - b;
    if (phep == '*') kq = a * b;
    if (phep == '/') kq = a / b;

    document.getElementById("ketqua").value = kq;
}
</script>

</body>
</html>
