<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài 21B</title>
</head>
<body>

<h3>Máy tính (radio)</h3>

Số 1:
<input type="text" id="so1"><br><br>

Số 2:
<input type="text" id="so2"><br><br>

Chọn phép toán:<br>
<input type="radio" name="phep" value="+"> Cộng<br>
<input type="radio" name="phep" value="-"> Trừ<br>
<input type="radio" name="phep" value="*"> Nhân<br>
<input type="radio" name="phep" value="/"> Chia<br><br>

Kết quả:
<input type="text" id="ketqua" readonly><br><br>

<button onclick="tinh()">Tính</button>

<script>
function tinh() {
    let a = parseFloat(document.getElementById("so1").value);
    let b = parseFloat(document.getElementById("so2").value);

    let phep = document.querySelector('input[name="phep"]:checked').value;
    let kq;

    if (phep == '+') kq = a + b;
    if (phep == '-') kq = a - b;
    if (phep == '*') kq = a * b;
    if (phep == '/') kq = a / b;

    document.getElementById("ketqua").value = kq;
}
</script>

</body>
</html>
